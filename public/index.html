<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Royale Reward</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NPNW091TKK"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-NPNW091TKK');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
.container{
  background: rgba(0,0,0,0.95);
  padding: 50px;
  border-radius: 25px;
  width: 95%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 50px rgba(0,0,0,0.9);
}
h1{color:#ffd700;margin-bottom:20px;}
p{color:#ccc;margin-bottom:20px;}
input{
  padding:15px;
  width:90%;
  border:none;
  border-radius:10px;
  margin-bottom:20px;
}
.button{
  background:#ffcc00;
  padding:18px;
  width:100%;
  border:none;
  border-radius:12px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}
.button:hover{background:#e6b800;}

.progress{
  margin-top:20px;
  background:#222;
  border-radius:15px;
  height:15px;
  overflow:hidden;
}
.bar{
  height:15px;
  width:0%;
  background:#00ff88;
}
.timer{
  margin-top:10px;
  color:red;
}
.stats{
  margin-top:20px;
  color:#3b82f6;
}
</style>
</head>

<body>

<div class="container">
<h1>🎁 Clash Royale Reward</h1>
<p>Complete verification to claim your reward</p>

<input type="text" placeholder="Enter username">

<button class="button" onclick="goOffer()">Continue</button>

<div class="progress"><div class="bar" id="bar"></div></div>
<div class="timer">Offer expires in <span id="time">46:00</span></div>
<div class="stats">Players today: <span id="count">97</span></div>

</div>

<script>

let offerLink = "";

// ✅ Load offer from API
async function loadOffer(){
  try{
    const res = await fetch("https://apiogads.vercel.app/api/offers");
    const data = await res.json();

    if(data.success){
      offerLink = data.offer.link;
      console.log("Offer loaded:", offerLink);
    }
  }catch(e){
    console.log("API error", e);
  }
}

// ✅ Redirect
function goOffer(){
  if(offerLink){
    window.location.href = offerLink;
  }else{
    alert("Loading offer, please wait...");
  }
}

// Start loading offer
loadOffer();

// Progress bar
let width = 0;
let bar = document.getElementById("bar");

setInterval(()=>{
  if(width < 100){
    width += 5;
    bar.style.width = width + "%";
  }
},200);

// Timer
let time = 46*60;
let t = document.getElementById("time");

setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  if(s<10) s="0"+s;
  t.innerHTML = m+":"+s;
  time--;
},1000);

</script>

</body>
</html>
