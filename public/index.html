<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Royale Reward</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-NPNW091TKK"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NPNW091TKK');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
.container{
  background:rgba(0,0,0,0.95);
  padding:50px;
  border-radius:25px;
  width:95%;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 50px rgba(0,0,0,0.9);
}
h1{
  font-size:30px;
  margin-bottom:20px;
  color:#ffd700;
}
p{color:#ccc;margin-bottom:25px;}
input{
  padding:15px;
  width:90%;
  border:none;
  border-radius:10px;
  margin-bottom:20px;
}
.button{
  background:#ffcc00;
  color:black;
  padding:18px;
  width:100%;
  font-size:20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
.button:hover{background:#e6b800;}
</style>
</head>

<body>

<div class="container">
<h1>🎁 Unlock Your Reward</h1>
<p>Complete verification to continue</p>

<input type="text" placeholder="Enter username">

<button class="button" onclick="goOffer()">Continue</button>
</div>

<script>

// 🔥 دالة الزر (ربط مع API)
function goOffer(){

  gtag('event','click');

  fetch('/api/offers')
    .then(res => res.json())
    .then(data => {

      if(data.success && data.offers && data.offers.length > 0){

        // أول offer
        window.location.href = data.offers[0].link;

      } else {

        // fallback (locker)
        window.location.href = "https://ogam.site/cl/i/n66xj9";

      }

    })
    .catch(() => {

      window.location.href = "https://ogam.site/cl/i/n66xj9";

    });

}

</script>

</body>
</html>
